name: notify-be-on-fe-local

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  repository-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to BE
        env:
          GH_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          TARGET_REPO: rktclgh/vlainter_BE_local
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "CI_GITHUB_TOKEN secret is missing"
            exit 1
          fi

          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/${TARGET_REPO}/dispatches \
            -d @- <<JSON
          {
            "event_type": "fe-updated-local",
            "client_payload": {
              "fe_sha": "${{ github.sha }}",
              "fe_ref": "${{ github.ref_name }}",
              "fe_repo": "${{ github.repository }}"
            }
          }
          JSON
